<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoppoTerm SSH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --noppo-blue: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.6);
            /* ライトデザイン：白ベース */
            --border-color: rgba(0, 212, 255, 0.2);
            --text-main: #222;
        }

        body,
        html {
            background: #f0f2f5;
            /* 明るい背景 */
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Fira Code', -apple-system, sans-serif;
            color: var(--text-main);
        }

        /* --- 接続GUIレイヤー --- */
        #gui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            transition: transform 0.5s ease-in-out;
        }

        .login-card {
            width: 85%;
            max-width: 400px;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .login-card h2 {
            color: var(--noppo-blue);
            margin-bottom: 25px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--noppo-blue);
        }

        .connect-btn {
            width: 100%;
            padding: 14px;
            background: var(--noppo-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        /* --- ターミナルレイヤー --- */
        #term-layer {
            flex: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
        }

        #terminal-wrapper {
            flex: 1;
            margin: 12px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        #toolbar {
            height: 52px;
            display: flex;
            background: white;
            border-top: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .tool-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 0 20px;
            color: var(--noppo-blue);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 14px;
        }

        #vp-shim {
            height: 0;
        }

        /* 表示切り替え用クラス */
        body.connected #gui-layer {
            transform: translateY(-100%);
        }

        body.connected #term-layer {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>

    <div id="gui-layer">
        <div class="login-card">
            <h2>NoppoTerm SSH</h2>
            <input type="text" id="host" placeholder="Host (IP Address)" value="">
            <input type="text" id="user" placeholder="User Name">
            <input type="password" id="pass" placeholder="Password">
            <button class="connect-btn" onclick="connect()">CONNECT</button>
        </div>
    </div>

    <div id="term-layer">
        <div id="terminal-wrapper">
            <div id="terminal"></div>
        </div>
        <div id="toolbar">
            <div class="tool-btn" data-key="Tab">TAB</div>
            <div class="tool-btn" data-key="Ctrl">CTRL</div>
            <div class="tool-btn" data-key="Esc">ESC</div>
            <div class="tool-btn" data-key="↑">UP</div>
            <div class="tool-btn" data-key="↓">DOWN</div>
        </div>
    </div>
    <div id="vp-shim"></div>

    <script type="module">
        import { registerPlugin } from '@capacitor/core';
        const SSH = registerPlugin('SSH');

        const term = new Terminal({
            theme: {
                background: 'transparent',
                foreground: '#333', /* ライトデザイン用の文字色 */
                cursor: '#00d4ff',
                selectionBackground: 'rgba(0, 212, 255, 0.2)',
                black: '#000000', blue: '#00d4ff', white: '#ffffff'
            },
            fontFamily: "'Fira Code', monospace",
            fontSize: 14, cursorBlink: true, allowTransparency: true
        });

        term.open(document.getElementById('terminal'));

        // 接続処理
        window.connect = async () => {
            const host = document.getElementById('host').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            if (!host || !user || !pass) return alert("All fields are required.");

            try {
                document.body.classList.add('connected');
                term.write('\x1b[34m[System] Connecting to ' + host + '...\x1b[0m\r\n');

                await SSH.connect({ host, user, pass });

                // タップでキーボードを出す
                document.getElementById('terminal-wrapper').onclick = () => {
                    term.focus();
                    document.querySelector('.xterm-helper-textarea')?.focus();
                };
            } catch (e) {
                alert("Connect Error: " + e);
                document.body.classList.remove('connected');
            }
        };

        // SSH 受信
        SSH.addListener('data', (data) => term.write(data.value));

        // 入力送信
        term.onData(data => SSH.sendCommand({ data }));

        // ツールバー
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.ontouchstart = (e) => {
                e.preventDefault();
                const key = btn.dataset.key;
                const codes = { 'Tab': '\t', 'Esc': '\x1b', '↑': '\x1b[A', '↓': '\x1b[B' };
                SSH.sendCommand({ data: codes[key] || key });
            };
        });

        // キーボードリサイズ対策
        window.visualViewport?.addEventListener('resize', () => {
            const shim = document.getElementById('vp-shim');
            shim.style.height = `${window.innerHeight - window.visualViewport.height}px`;
        });
    </script>
</body>

</html>
